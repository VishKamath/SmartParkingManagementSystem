<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartPark Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGIN -->

<div class="login-screen" id="login-screen">

<div class="login-card">
<h2>SmartPark Login</h2>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button id="login-btn">Login</button>

<p id="login-error" style="display:none;color:red;">Invalid Login</p>

</div>
</div>

<!-- DASHBOARD -->

<div class="app" id="app" style="display:none">

<header class="topbar">
<h2>SmartPark Management System</h2>

<div>
<span id="clock">--:--:--</span>
<button id="logout-btn">Logout</button>
</div>

</header>

<!-- LEFT -->

<aside class="left">

<div class="mini-card">
<h4>Total Revenue</h4>
<h2 id="revenue">₹0</h2>
</div>

<div class="mini-card">
<h4>Occupied</h4>
<h2 id="occ-count">0</h2>
</div>

<div class="mini-card">
<h4>Available</h4>
<h2 id="free-count">3</h2>
</div>

<div class="slots-list" id="slots-list"></div>

</aside>

<!-- RIGHT -->

<main class="right">

<div class="gate-banner">
<h3>Gate Status</h3>
<h2 id="gate-val">Loading...</h2>
</div>

<div class="log-wrap">

<h3>Activity Log</h3>

<table>
<thead>
<tr>
<th>Vehicle</th>
<th>Slot</th>
<th>Event</th>
<th>Time</th>
<th>Amount</th>
</tr>
</thead>

<tbody id="log-body">
<tr>
<td colspan="5">Waiting for Arduino...</td>
</tr>
</tbody>

</table>

</div>

</main>

</div>

<script>

const USERS = { admin: "smartpark123" };

const loginBtn = document.getElementById("login-btn");
const loginErr = document.getElementById("login-error");

loginBtn.onclick = () => {

const u = document.getElementById("username").value;
const p = document.getElementById("password").value;

if (USERS[u] === p) {

document.getElementById("login-screen").style.display = "none";
document.getElementById("app").style.display = "grid";

initDashboard();

} else {
loginErr.style.display = "block";
}

};



document.getElementById("logout-btn").onclick = () => {
location.reload();
};



function initDashboard(){

updateClock();
setInterval(updateClock,1000);

fetchStatus();
setInterval(fetchStatus,1000);

}



function updateClock(){
document.getElementById("clock").innerText =
new Date().toLocaleTimeString();
}



function renderSlots(data){

document.getElementById("slots-list").innerHTML =

`
<div>Slot 1 : ${data.slot1 ? "Occupied" : "Available"}</div>
<div>Slot 2 : ${data.slot2 ? "Occupied" : "Available"}</div>
<div>Slot 3 : ${data.slot3 ? "Occupied" : "Available"}</div>
`;

}



function updateStats(data){

document.getElementById("occ-count").innerText = data.occupied;
document.getElementById("free-count").innerText = data.available;

}



function updateGate(status){

document.getElementById("gate-val").innerText = status;

}



function renderLog(logs){

const body = document.getElementById("log-body");

if(!logs.length){
body.innerHTML =
`<tr><td colspan="5">No Activity</td></tr>`;
return;
}

body.innerHTML = logs.map(l =>

`
<tr>
<td>${l.vehicle}</td>
<td>${l.slot}</td>
<td>${l.event}</td>
<td>${l.time}</td>
<td>${l.amount}</td>
</tr>
`

).join("");

}



async function fetchStatus(){

try{

const dataRes = await fetch("/data");
const data = await dataRes.json();

const logRes = await fetch("/activity");
const logs = await logRes.json();

document.getElementById("revenue").innerText =
"₹" + data.totalRevenue;

updateGate(data.gateStatus);

renderSlots(data);
updateStats(data);

renderLog(logs);

}
catch(e){
console.log("Fetch error",e);
}

}

</script>

</body>
</html>
